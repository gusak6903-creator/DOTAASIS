<!DOCTYPE html>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOTAASIS ULTIMATE</title>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- Scripts -->
  <script src="app.js" defer></script>
</head>
<body>

<header class="glass header">
  <div class="logo">DOTAASIS ULTIMATE</div>

  <nav class="nav">
    <button data-tab="heroes">ГЕРОИ</button>
    <button data-tab="items">ПРЕДМЕТЫ</button>
    <button data-tab="builds">СБОРКИ</button>
    <button data-tab="draft">ДРАФТ</button>
  </nav>
</header>

<main>
  <section id="heroes" class="tab active">
    <input type="text" id="search" placeholder="Поиск героя..." class="search glass">
    <div id="heroesGrid" class="grid"></div>
  </section>

  <section id="items" class="tab">
    <div id="itemsGrid" class="grid"></div>
  </section>

  <section id="builds" class="tab">
    <div class="glass box">
      <h2>Сборки появятся позже</h2>
    </div>
  </section>

  <section id="draft" class="tab">
    <div class="glass box">
      <h2>Драфт помощник</h2>
      <button onclick="analyzeDraft()">Анализировать</button>
      <div id="draftResult"></div>
    </div>
  </section>
</main>

<div id="modal" class="modal">
  <div class="modal-content glass">
    <span class="close" onclick="closeModal()">✖</span>
    <div id="modalData"></div>
  </div>
</div>

</body>
</html>
