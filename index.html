<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOTAASIS | GLOBAL ANALYTICS 7.41A</title>
    <style>
        :root { --bg: #0b0b0e; --panel: #16161d; --accent: #a335ee; --gold: #f1c40f; --text: #e1e1e1; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #000; padding: 15px 30px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 3px; }
        .patch-tag { background: var(--accent); padding: 4px 10px; border-radius: 4px; font-size: 12px; }
        .search-container { background: #111; padding: 15px; text-align: center; border-bottom: 1px solid #333; }
        #search { width: 60%; padding: 12px 25px; border-radius: 25px; border: 1px solid #444; background: #000; color: #fff; outline: none; transition: 0.3s; }
        #search:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(163, 53, 238, 0.5); }
        main { display: grid; grid-template-columns: 1fr 320px; gap: 0; flex-grow: 1; overflow: hidden; }
        .hero-section { padding: 20px; overflow-y: auto; background: #0d0d11; }
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        .hero-card { background: var(--panel); border-radius: 6px; overflow: hidden; border: 1px solid #222; cursor: pointer; transition: 0.2s; position: relative; }
        .hero-card:hover { border-color: var(--accent); transform: scale(1.03); z-index: 2; }
        .hero-card img { width: 100%; display: block; }
        .hero-name { padding: 6px; font-size: 11px; text-align: center; background: rgba(0,0,0,0.8); position: absolute; bottom: 0; width: 100%; }
        .sidebar { background: #111; border-left: 1px solid #333; padding: 20px; overflow-y: auto; }
        .item-card { display: flex; align-items: center; gap: 10px; background: #1a1a22; padding: 10px; border-radius: 6px; margin-bottom: 10px; border: 1px solid #333; }
        .item-card img { width: 40px; border: 1px solid var(--gold); }
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1c1c24; padding: 30px; border: 2px solid var(--accent); border-radius: 15px; z-index: 100; box-shadow: 0 0 50px #000; width: 300px; text-align: center; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 99; }
    </style>
</head>
<body>

<header>
    <div class="logo">DOTA<span style="color:var(--accent)">ASIS</span></div>
    <div class="patch-tag">V. 7.41A GLOBAL</div>
</header>

<div class="search-container">
    <input type="text" id="search" placeholder="Поиск героя...">
</div>

<main>
    <section class="hero-section">
        <div class="hero-grid" id="heroGrid"></div>
    </section>
    <aside class="sidebar">
        <h3 style="color:var(--gold)">META ITEMS</h3>
        <div class="item-card"><img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/items/black_king_bar.png"><div><b>BKB</b></div></div>
        <div class="item-card"><img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/items/blink.png"><div><b>Blink</b></div></div>
        <div class="item-card"><img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/items/silver_edge.png"><div><b>Silver Edge</b></div></div>
    </aside>
</main>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div id="modal">
    <h2 id="mName" style="color:var(--accent)"></h2>
    <p style="color:var(--gold)">КОНТРПИКИ:</p>
    <p id="mCounter"></p>
    <button onclick="closeModal()" style="padding:10px 20px; cursor:pointer;">Закрыть</button>
</div>

<script>
    const heroes = [
        { n: "Abaddon", id: "abaddon", c: "Doom, Slark, AA" },
        { n: "Alchemist", id: "alchemist", c: "AA, Lifestealer, Slardar" },
        { n: "Anti-Mage", id: "antimage", c: "Meepo, LC, Disruptor" },
        { n: "Axe", id: "axe", c: "Viper, Venomancer, Timbersaw" },
        { n: "Bloodseeker", id: "bloodseeker", c: "Troll, Morphling" },
        { n: "Drow Ranger", id: "drow_ranger", c: "PA, Clockwerk" },
        { n: "Invoker", id: "invoker", c: "Nyx, Silencer, Pugna" },
        { n: "Juggernaut", id: "juggernaut", c: "OD, Slardar" },
        { n: "Legion Commander", id: "legion_commander", c: "Oracle, Dazzle" },
        { n: "Morphling", id: "morphling", c: "AA, OD, Elder Titan" },
        { n: "Phantom Assassin", id: "phantom_assassin", c: "Axe, Morphling" },
        { n: "Pudge", id: "pudge", c: "Lifestealer, Slark, Ursa" },
        { n: "Shadow Fiend", id: "nevermore", c: "TA, Zeus" },
        { n: "Slark", id: "slark", c: "Bloodseeker, Disruptor" },
        { n: "Sniper", id: "sniper", c: "Spirit Breaker, Spectre" },
        { n: "Sven", id: "sven", c: "Wyvern, Troll" },
        { n: "Ursa", id: "ursa", c: "Venomancer, Viper" },
        { n: "Wraith King", id: "skeleton_king", c: "AM, Lion" },
        { n: "Zeus", id: "zuus", c: "AM, TA, Huskar" }
    ];

    function render(q = "") {
        const g = document.getElementById('heroGrid');
        g.innerHTML = "";
        heroes.filter(h => h.n.toLowerCase().includes(q.toLowerCase())).forEach(h => {
            const d = document.createElement('div');
            d.className = 'hero-card';
            d.innerHTML = `<img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${h.id}.png"><div class="hero-name">${h.n}</div>`;
            d.onclick = () => {
                document.getElementById('mName').innerText = h.n;
                document.getElementById('mCounter').innerText = h.c;
                document.getElementById('modal').style.display = 'block';
                document.getElementById('overlay').style.display = 'block';
            };
            g.appendChild(d);
        });
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    document.getElementById('search').oninput = (e) => render(e.target.value);
    render();
</script>
</body>
</html>
