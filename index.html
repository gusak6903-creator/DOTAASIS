<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dota 2 Counterpick — Патч 7.41</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- BACKGROUND EFFECTS -->
  <div class="bg-layer">
    <div class="bg-radiant"></div>
    <div class="bg-dire"></div>
    <div class="bg-grid"></div>
    <div class="particles" id="particles"></div>
  </div>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⚔</span>
        <div>
          <div class="logo-title">DOTA 2</div>
          <div class="logo-sub">COUNTERPICK DATABASE</div>
        </div>
        <div class="patch-badge">PATCH 7.41</div>
      </div>
      <nav class="nav-tabs">
        <button class="nav-tab active" data-tab="heroes">ГЕРОИ</button>
        <button class="nav-tab" data-tab="items">ПРЕДМЕТЫ</button>
        <button class="nav-tab" data-tab="counterpick">КОНТРПИК</button>
      </nav>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main-content">

    <!-- HEROES TAB -->
    <section class="tab-section active" id="tab-heroes">
      <div class="section-header">
        <h2>ВСЕ ГЕРОИ <span class="count-badge" id="hero-count">—</span></h2>
        <div class="filters">
          <input class="search-input" id="hero-search" placeholder="Поиск героя..." />
          <div class="attr-filters">
            <button class="attr-btn active" data-attr="all">ВСЕ</button>
            <button class="attr-btn str" data-attr="str">💪 СИЛА</button>
            <button class="attr-btn agi" data-attr="agi">🗡 ЛОВКОСТЬ</button>
            <button class="attr-btn int" data-attr="int">✨ ИНТЕЛЛЕКТ</button>
            <button class="attr-btn uni" data-attr="all_stats">☯ УНИВЕРСАЛ</button>
          </div>
          <div class="role-filters" id="role-filters"></div>
        </div>
      </div>
      <div class="loading-state" id="heroes-loading">
        <div class="loader-ring"></div>
        <p>Загрузка героев с API...</p>
      </div>
      <div class="heroes-grid" id="heroes-grid"></div>
    </section>

    <!-- ITEMS TAB -->
    <section class="tab-section" id="tab-items">
      <div class="section-header">
        <h2>ВСЕ ПРЕДМЕТЫ <span class="count-badge" id="item-count">—</span></h2>
        <div class="filters">
          <input class="search-input" id="item-search" placeholder="Поиск предмета..." />
          <div class="attr-filters">
            <button class="item-cat-btn active" data-cat="all">ВСЕ</button>
            <button class="item-cat-btn" data-cat="consumable">Расходники</button>
            <button class="item-cat-btn" data-cat="attributes">Аттрибуты</button>
            <button class="item-cat-btn" data-cat="armor">Броня</button>
            <button class="item-cat-btn" data-cat="weapon">Оружие</button>
            <button class="item-cat-btn" data-cat="miscellaneous">Разное</button>
            <button class="item-cat-btn" data-cat="secret_shop">Секретная лавка</button>
            <button class="item-cat-btn" data-cat="common">Аксессуары</button>
            <button class="item-cat-btn" data-cat="support">Поддержка</button>
            <button class="item-cat-btn" data-cat="caster">Маг</button>
            <button class="item-cat-btn" data-cat="neutral">🌿 Нейтральные</button>
          </div>
        </div>
      </div>
      <div class="loading-state" id="items-loading">
        <div class="loader-ring"></div>
        <p>Загрузка предметов с API...</p>
      </div>
      <div class="items-grid" id="items-grid"></div>
    </section>

    <!-- COUNTERPICK TAB -->
    <section class="tab-section" id="tab-counterpick">
      <div class="counterpick-layout">
        <div class="cp-sidebar">
          <h2>КОНТРПИК</h2>
          <p class="cp-desc">Выбери вражеского героя, чтобы увидеть лучшие контрпики и рекомендованные предметы.</p>
          <input class="search-input" id="cp-search" placeholder="Поиск врага..." />
          <div class="cp-hero-list" id="cp-hero-list"></div>
        </div>
        <div class="cp-result" id="cp-result">
          <div class="cp-placeholder">
            <div class="cp-placeholder-icon">⚔</div>
            <p>Выбери вражеского героя</p>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- HERO MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="hero-modal" id="hero-modal">
      <button class="modal-close" id="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- ITEM MODAL -->
  <div class="modal-overlay" id="item-modal-overlay">
    <div class="item-modal" id="item-modal">
      <button class="modal-close" id="item-modal-close">✕</button>
      <div id="item-modal-content"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
