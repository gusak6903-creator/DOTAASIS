<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOTAASIS | PRO ANALYTICS</title>
    <style>
        :root { --bg: #0b0b0e; --panel: #1c1c24; --accent: #a335ee; --gold: #f1c40f; --text: #e1e1e1; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        header { background: #111116; padding: 20px; border-bottom: 2px solid var(--accent); text-align: center; }
        .search-container { padding: 20px; display: flex; justify-content: center; background: #16161d; }
        #search { width: 80%; max-width: 800px; padding: 15px; border-radius: 30px; border: 1px solid var(--accent); background: #000; color: #fff; outline: none; }

        main { display: grid; grid-template-columns: 1fr 350px; gap: 20px; padding: 20px; flex-grow: 1; }
        @media (max-width: 900px) { main { grid-template-columns: 1fr; } }

        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        .hero-card { background: var(--panel); border-radius: 8px; overflow: hidden; border: 1px solid #333; transition: 0.2s; cursor: pointer; position: relative; }
        .hero-card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 5px 15px rgba(163, 53, 238, 0.4); }
        .hero-card img { width: 100%; display: block; }
        .hero-name { padding: 8px; font-size: 13px; text-align: center; font-weight: bold; background: rgba(0,0,0,0.8); position: absolute; bottom: 0; width: 100%; }

        /* Красивое всплывающее окно */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal { background: #1c1c24; border: 2px solid var(--accent); border-radius: 15px; padding: 30px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 0 30px var(--accent); position: relative; }
        .modal h2 { color: var(--accent); margin-top: 0; }
        .modal .role { color: #888; font-size: 14px; margin-bottom: 20px; display: block; }
        .modal .counter-list { background: #000; padding: 15px; border-radius: 8px; border: 1px solid #333; color: var(--gold); font-weight: bold; }
        .close-btn { margin-top: 20px; padding: 10px 25px; background: var(--accent); border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; letter-spacing: 4px;">DOTA<span style="color:var(--accent)">ASIS</span></h1>
</header>

<div class="search-container">
    <input type="text" id="search" placeholder="Поиск героя...">
</div>

<main>
    <section class="hero-grid" id="heroGrid"></section>
    <aside style="background: var(--panel); padding: 20px; border-radius: 12px; border: 1px solid #333;">
        <h2 style="color:var(--gold)">TOP ITEMS</h2>
        <p>BKB, Blink, Manta</p>
    </aside>
</main>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2 id="modalHeroName"></h2>
        <span class="role" id="modalHeroRole"></span>
        <div style="margin-bottom: 10px;">КОНТРПИКИ:</div>
        <div class="counter-list" id="modalHeroCounter"></div>
        <button class="close-btn" onclick="closeModal()">ЗАКРЫТЬ</button>
    </div>
</div>

<script>
    const heroes = [
        { n: "Anti-Mage", id: "antimage", c: "Meepo, LC, Disruptor, Axe", r: "Carry" },
        { n: "Axe", id: "axe", c: "Viper, Venomancer, Lifestealer", r: "Offlane" },
        { n: "Pudge", id: "pudge", c: "Lifestealer, Slark, Ursa", r: "Support/Off" },
        { n: "Phantom Assassin", id: "phantom_assassin", c: "Axe, Morphling, Tinker", r: "Carry" },
        { n: "Juggernaut", id: "juggernaut", c: "OD, Slardar, Windranger", r: "Carry" },
        { n: "Slark", id: "slark", c: "Bloodseeker, Leshrac, Tiny", r: "Carry" },
        { n: "Invoker", id: "invoker", c: "Nyx Assassin, Pugna, Silencer", r: "Mid" },
        { n: "Sniper", id: "sniper", c: "Spirit Breaker, Spectre, Storm", r: "Mid/Carry" },
        { n: "Legion Commander", id: "legion_commander", c: "Oracle, Dazzle, Wyvern", r: "Offlane" },
        { n: "Shadow Fiend", id: "nevermore", c: "TA, Zeus, Kunkka", r: "Mid" }
    ];

    function openModal(hero) {
        document.getElementById('modalHeroName').innerText = hero.n;
        document.getElementById('modalHeroRole').innerText = hero.r;
        document.getElementById('modalHeroCounter').innerText = hero.c;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
    }

    function draw(query = "") {
        const grid = document.getElementById('heroGrid');
        grid.innerHTML = "";
        heroes.filter(h => h.n.toLowerCase().includes(query.toLowerCase())).forEach(h => {
            const card = document.createElement('div');
            card.className = 'hero-card';
            card.innerHTML = `
                <img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${h.id}.png">
                <div class="hero-name">${h.n}</div>
            `;
            card.onclick = () => openModal(h);
            grid.appendChild(card);
        });
    }

    document.getElementById('search').oninput = (e) => draw(e.target.value);
    draw();
</script>

</body>
</html>
