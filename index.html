<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dota 2 Draft Assistant</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
    }

    header {
      padding: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
    }

    .search {
      padding: 10px 15px;
      border-radius: 12px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
      width: 250px;
    }

    .filters {
      display: flex;
      gap: 10px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 8px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      cursor: pointer;
      transition: 0.3s;
    }

    .filter-btn:hover {
      background: rgba(99,102,241,0.4);
    }

    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border-radius: 20px;
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 15px;
      transition: 0.3s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(99,102,241,0.3), transparent);
      opacity: 0;
      transition: 0.3s;
    }

    .card:hover::before { opacity: 1; }

    .card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }

    .card img {
      width: 100%;
      border-radius: 12px;
    }

    .hero-name {
      margin-top: 10px;
      font-size: 18px;
      font-weight: 600;
    }

    .roles {
      font-size: 13px;
      opacity: 0.6;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      width: 90%;
      max-width: 600px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(20px);
    }

    .close {
      float: right;
      cursor: pointer;
      font-size: 20px;
    }

  </style>
</head>
<body>

<header>
  <div class="logo">Dota Draft AI</div>
  <input type="text" class="search" placeholder="Search hero..." id="search" />
</header>

<div class="filters" id="filters"></div>

<div class="container" id="heroes"></div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent">
    <span class="close" onclick="closeModal()">✖</span>
    <div id="heroDetails"></div>
  </div>
</div>

<script>
let heroesData = [];
let currentRole = null;

const rolesSet = new Set();

async function loadHeroes() {
  const res = await fetch('https://api.opendota.com/api/heroStats');
  heroesData = await res.json();

  heroesData.forEach(h => h.roles.forEach(r => rolesSet.add(r)));
  renderFilters();
  renderHeroes(heroesData);
}

function renderFilters() {
  const container = document.getElementById('filters');

  rolesSet.forEach(role => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.innerText = role;
    btn.onclick = () => {
      currentRole = role;
      applyFilters();
    };
    container.appendChild(btn);
  });
}

function renderHeroes(list) {
  const container = document.getElementById('heroes');
  container.innerHTML = '';

  list.forEach(hero => {
    const card = document.createElement('div');
    card.className = 'card';

    const img = `https://cdn.cloudflare.steamstatic.com${hero.img}`;

    card.innerHTML = `
      <img src="${img}" />
      <div class="hero-name">${hero.localized_name}</div>
      <div class="roles">${hero.roles.join(', ')}</div>
    `;

    card.onclick = () => openModal(hero);

    container.appendChild(card);
  });
}

function applyFilters() {
  let filtered = heroesData;

  if (currentRole) {
    filtered = filtered.filter(h => h.roles.includes(currentRole));
  }

  const search = document.getElementById('search').value.toLowerCase();

  if (search) {
    filtered = filtered.filter(h => h.localized_name.toLowerCase().includes(search));
  }

  renderHeroes(filtered);
}

function openModal(hero) {
  const modal = document.getElementById('modal');
  const details = document.getElementById('heroDetails');

  details.innerHTML = `
    <h2>${hero.localized_name}</h2>
    <p><b>Primary Attribute:</b> ${hero.primary_attr}</p>
    <p><b>Attack Type:</b> ${hero.attack_type}</p>
    <p><b>Roles:</b> ${hero.roles.join(', ')}</p>
    <p><b>Base HP:</b> ${hero.base_health}</p>
    <p><b>Base Mana:</b> ${hero.base_mana}</p>
    <p><b>Move Speed:</b> ${hero.move_speed}</p>
  `;

  modal.style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

// search event

document.getElementById('search').addEventListener('input', applyFilters);

loadHeroes();
</script>

</body>
</html>
