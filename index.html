<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOTAASIS | GLOBAL STATS 7.41A</title>
    <style>
        :root { --bg: #0b0b0e; --panel: #1c1c24; --accent: #a335ee; --gold: #f1c40f; --text: #e1e1e1; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: #111116; padding: 20px; border-bottom: 2px solid var(--accent); text-align: center; }
        .search-container { padding: 20px; display: flex; justify-content: center; background: #16161d; }
        #search { width: 80%; max-width: 800px; padding: 15px; border-radius: 30px; border: 1px solid var(--accent); background: #000; color: #fff; font-size: 1.1rem; outline: none; }

        main { display: grid; grid-template-columns: 1fr 350px; gap: 20px; padding: 20px; flex-grow: 1; }
        @media (max-width: 900px) { main { grid-template-columns: 1fr; } }

        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        .hero-card { background: var(--panel); border-radius: 8px; overflow: hidden; border: 1px solid #333; transition: 0.2s; cursor: pointer; position: relative; }
        .hero-card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 5px 15px rgba(163, 53, 238, 0.4); }
        .hero-card img { width: 100%; display: block; filter: grayscale(30%); }
        .hero-card:hover img { filter: grayscale(0%); }
        .hero-name { padding: 8px; font-size: 13px; text-align: center; font-weight: bold; background: rgba(0,0,0,0.7); position: absolute; bottom: 0; width: 100%; }

        .items-sidebar { background: var(--panel); border-radius: 12px; padding: 20px; border: 1px solid #333; align-self: start; }
        .item-row { display: flex; align-items: center; gap: 12px; padding: 10px; border-bottom: 1px solid #2d2d38; }
        .item-row img { width: 45px; border-radius: 4px; border: 1px solid var(--gold); }
        .item-info b { color: var(--gold); display: block; font-size: 14px; }
        .item-info span { font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; letter-spacing: 4px;">DOTA<span style="color:var(--accent)">ASIS</span></h1>
    <p style="margin:5px 0 0; color: #888;">АНАЛИТИКА И КОНТРПИКИ • ПАТЧ 7.41A</p>
</header>

<div class="search-container">
    <input type="text" id="search" placeholder="Поиск героя или предмета...">
</div>

<main>
    <section class="hero-grid" id="heroGrid"></section>
    
    <aside class="items-sidebar">
        <h2 style="color:var(--gold); border-bottom: 1px solid var(--gold); padding-bottom: 10px;">TOP ITEMS 7.41A</h2>
        <div id="itemList">
            <div class="item-row">
                <img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/items/black_king_bar.png">
                <div class="item-info"><b>BKB</b><span>Маст-хэв против контроля</span></div>
            </div>
            <div class="item-row">
                <img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/items/blink.png">
                <div class="item-info"><b>Blink Dagger</b><span>Для инициации (Axe, LC)</span></div>
            </div>
            <div class="item-row">
                <img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/items/nullifier.png">
                <div class="item-info"><b>Nullifier</b><span>Против Ghost и Force Staff</span></div>
            </div>
        </div>
    </aside>
</main>

<script>
    // Большая база данных героев (добавь сюда всех по списку)
    const heroes = [
        { n: "Anti-Mage", id: "antimage", c: "Meepo, LC, Disruptor, Axe", role: "Carry" },
        { n: "Axe", id: "axe", c: "Viper, Venomancer, Lifestealer", role: "Offlane" },
        { n: "Pudge", id: "pudge", c: "Lifestealer, Slark, Ursa", role: "Support/Off" },
        { n: "Phantom Assassin", id: "phantom_assassin", c: "Axe, Morphling, Tinker", role: "Carry" },
        { n: "Juggernaut", id: "juggernaut", c: "OD, Slardar, Windranger", role: "Carry" },
        { n: "Slark", id: "slark", c: "Bloodseeker, Leshrac, Tiny", role: "Carry" },
        { n: "Invoker", id: "invoker", c: "Nyx Assassin, Pugna, Silencer", role: "Mid" },
        { n: "Sniper", id: "sniper", c: "Spirit Breaker, Spectre, Storm", role: "Mid/Carry" },
        { n: "Legion Commander", id: "legion_commander", c: "Oracle, Dazzle, Wyvern", role: "Offlane" },
        { n: "Shadow Fiend", id: "nevermore", c: "TA, Zeus, Kunkka", role: "Mid" }
    ];

    function draw(query = "") {
        const grid = document.getElementById('heroGrid');
        grid.innerHTML = "";
        const filtered = heroes.filter(h => h.n.toLowerCase().includes(query.toLowerCase()));
        
        filtered.forEach(h => {
            const card = document.createElement('div');
            card.className = 'hero-card';
            card.innerHTML = `
                <img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${h.id}.png">
                <div class="hero-name">${h.n}</div>
            `;
            card.onclick = () => alert(`ГЕРОЙ: ${h.n}\nРОЛЬ: ${h.role}\nКОНТРПИКИ: ${h.c}`);
            grid.appendChild(card);
        });
    }

    document.getElementById('search').oninput = (e) => draw(e.target.value);
    draw();
</script>

</body>
</html>
