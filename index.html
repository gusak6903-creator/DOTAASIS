<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dotaasis: Emerald Moss</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="particles"></div>
    <div class="ambient-glow"></div>

    <div class="app-container">
        <aside class="sidebar glass-panel">
            <div class="brand">
                <h1>DOTAASIS <span>VISION</span></h1>
                <p>Patch 7.41a | Emerald Core</p>
            </div>

            <div class="vision-mode-container">
                <button id="btn-scan" class="btn-emerald">
                    <span class="icon">👁️</span> Скан Скриншота (Vision)
                </button>
                <input type="file" id="upload-screenshot" accept="image/*" hidden>
                <div id="scan-overlay" class="scan-overlay hidden">
                    <div class="scan-line"></div>
                    <p>Анализ пикселей...</p>
                </div>
            </div>

            <div class="search-container">
                <input type="text" id="live-search" class="glass-input" placeholder="Живой поиск героя...">
            </div>

            <div class="hero-list" id="hero-list">
                </div>
        </aside>

        <main class="main-content glass-panel">
            <header class="draft-header">
                <h2>Анализ Драфта Противника</h2>
                <div class="selected-enemies" id="selected-enemies">
                    <div class="enemy-slot empty">Слот 1</div>
                    <div class="enemy-slot empty">Слот 2</div>
                    <div class="enemy-slot empty">Слот 3</div>
                    <div class="enemy-slot empty">Слот 4</div>
                    <div class="enemy-slot empty">Слот 5</div>
                </div>
                <button id="btn-analyze" class="btn-emerald disabled">Запустить Анализ</button>
            </header>

            <div id="analysis-result" class="analysis-result">
                <div class="placeholder-text">Выберите от 1 до 5 героев противника для анализа синергии, контрпиков и предметов.</div>
            </div>
        </main>
    </div>

    <script>
        /**
         * ==========================================
         * DOTAASIS BRIDGE SCRIPT & RU LOCALIZATION
         * ==========================================
         */

        const RU_TRANSLATIONS = {
            abaddon: { roleDesc: "Универсальный саппорт/оффлейнер. Снимает контроль, впитывает урон." },
            alchemist: { roleDesc: "Жадный кэрри. Требует спейса, разгоняется по золоту, боится анти-хила." },
            ancient_apparition: { roleDesc: "Убийца хилеров. Глобальный ульт полностью блокирует регенерацию." },
            anti_mage: { roleDesc: "Мобильный сплит-пушер. Сжигает ману, хард-контрит магов." },
            arc_warden: { roleDesc: "Лейт-гейм монстр. Фармит копией, отлично защищает базу." },
            axe: { roleDesc: "Агрессивный инициатор. Наказывает за плотное позиционирование." },
            bane: { roleDesc: "Сингл-таргет дизейблер. Пробивает БКБ ультимейтом, спасает сном." },
            crystal_maiden: { roleDesc: "Хрупкий саппорт. Дает глобальную ману, мощный тимфайт-ульт." },
            // ... (Сюда легко масштабируется весь остальной пул из 120+ героев)
        };

        // Состояние приложения
        let currentDraft = [];
        let allHeroes = []; // Подтягивается из window.DOTAASIS.HEROES

        document.addEventListener('DOMContentLoaded', async () => {
            // Эмуляция загрузки из app.js, если скрипт подключен
            if (window.DOTAASIS && window.DOTAASIS.heroes) {
                allHeroes = Object.keys(window.DOTAASIS.heroes);
            } else {
                // Фолбэк для теста UI
                allHeroes = Object.keys(RU_TRANSLATIONS);
            }

            initLiveSearch();
            initVisionMode();
            renderHeroList(allHeroes);
        });

        // ==========================================
        // 1. ЖИВОЙ ПОИСК (Live Search)
        // ==========================================
        function initLiveSearch() {
            const searchInput = document.getElementById('live-search');
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                const filtered = allHeroes.filter(hero => {
                    const localName = RU_TRANSLATIONS[hero]?.name || hero;
                    return hero.includes(query) || localName.toLowerCase().includes(query);
                });
                renderHeroList(filtered);
            });
        }

        function renderHeroList(heroes) {
            const container = document.getElementById('hero-list');
            container.innerHTML = ''; // Очистка

            heroes.forEach(heroKey => {
                const heroData = window.DOTAASIS ? window.DOTAASIS.heroes[heroKey] : null;
                const locData = RU_TRANSLATIONS[heroKey] || {};
                
                const el = document.createElement('div');
                el.className = 'hero-card glass-panel interactive';
                el.innerHTML = `
                    <div class="hero-name">${locData.name || heroKey.toUpperCase()}</div>
                    <div class="hero-role">${locData.roleDesc || 'Роль не указана'}</div>
                    ${heroData ? `<div class="hero-stats">Сложность: ${heroData.complexity}</div>` : ''}
                `;
                
                el.addEventListener('click', () => toggleDraft(heroKey));
                container.appendChild(el);
            });
        }

        // ==========================================
        // 2. ЛОГИКА ДРАФТА И ДЕСТРУКЦИЯ DOM
        // ==========================================
        function toggleDraft(heroKey) {
            if (currentDraft.includes(heroKey)) {
                currentDraft = currentDraft.filter(h => h !== heroKey);
            } else {
                if (currentDraft.length < 5) currentDraft.push(heroKey);
            }
            updateDraftUI();
            resetAnalysisDOM(); // ПОЛНАЯ ДЕСТРУКЦИЯ старого анализа при любом изменении
        }

        function updateDraftUI() {
            const slots = document.querySelectorAll('.enemy-slot');
            slots.forEach((slot, index) => {
                if (currentDraft[index]) {
                    slot.textContent = currentDraft[index];
                    slot.classList.remove('empty');
                    slot.classList.add('filled');
                } else {
                    slot.textContent = `Слот ${index + 1}`;
                    slot.classList.remove('filled');
                    slot.classList.add('empty');
                }
            });

            const btn = document.getElementById('btn-analyze');
            if (currentDraft.length > 0) {
                btn.classList.remove('disabled');
                btn.onclick = runAnalysis;
            } else {
                btn.classList.add('disabled');
                btn.onclick = null;
            }
        }

        function resetAnalysisDOM() {
            const container = document.getElementById('analysis-result');
            // Жесткое удаление всех дочерних элементов
            while (container.firstChild) {
                container.removeChild(container.firstChild);
            }
            container.innerHTML = '<div class="placeholder-text">Изменения зафиксированы. Нажмите "Запустить Анализ" для перерасчета.</div>';
        }

        async function runAnalysis() {
            const container = document.getElementById('analysis-result');
            container.innerHTML = '<div class="loader">Анализ паттернов...</div>';

            // Эмуляция задержки API OpenDota
            await new Promise(r => setTimeout(r, 600));

            // Деструкция лоадера
            container.innerHTML = '';

            // Интеграция с app.js (если есть)
            let analysisHtml = `<div class="analysis-grid">`;
            
            if (window.DOTAASIS) {
                const result = window.DOTAASIS.analyzeDraft(currentDraft);
                analysisHtml += `<div class="threat-level glass-panel">Общая угроза: ${result.overallEnemyThreat}</div>`;
                // Здесь будет рендер контрпиков и предметов
            } else {
                analysisHtml += `<div class="glass-panel"><h3>Анализ для: ${currentDraft.join(', ')}</h3><p>Ядро app.js не подключено. Это тестовый вывод.</p></div>`;
            }

            analysisHtml += `</div>`;
            container.innerHTML = analysisHtml;
        }

        // ==========================================
        // 3. VISION MODE (Инновация OCR)
        // ==========================================
        function initVisionMode() {
            const btnScan = document.getElementById('btn-scan');
            const fileInput = document.getElementById('upload-screenshot');
            const overlay = document.getElementById('scan-overlay');

            btnScan.addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    processGameScreenshot(file);
                }
            });
        }

        function processGameScreenshot(imgFile) {
            console.log('[VISION] Инициализация сканирования...', imgFile.name);
            const overlay = document.getElementById('scan-overlay');
            overlay.classList.remove('hidden');

            // Заглушка: имитация работы Tesseract.js / OpenCV
            setTimeout(() => {
                overlay.classList.add('hidden');
                // Допустим, нейросеть распознала 3 героев:
                currentDraft = ['alchemist', 'ancient_apparition', 'axe'];
                updateDraftUI();
                resetAnalysisDOM();
                
                // Визуальный фидбек
                alert('Vision Scanner: Обнаружено 3 героя!');
            }, 2500); // 2.5 секунды на "обработку"
        }
    </script>
</body>
</html>
