<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOTAASIS | PREMIUM ANALYTICS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-overlay"></div>
    
    <nav class="glass-nav">
        <div class="logo">DOTA<span>ASIS</span></div>
        <div class="nav-group">
            <button class="nav-link active" data-sec="heroes">ГЕРОИ</button>
            <button class="nav-link" data-sec="items">ПРЕДМЕТЫ</button>
            <button class="nav-link draft-btn" data-sec="draft">ДРАФТ-АНАЛИТИК</button>
        </div>
    </nav>

    <div id="loader" class="loader-wrap">
        <div class="spinner"></div>
        <p>ЗАГРУЗКА ДАННЫХ VALVE...</p>
    </div>

    <main class="container">
        <section id="heroes-sec" class="page active">
            <div class="search-wrap fade-in">
                <input type="text" id="heroSearch" placeholder="Найти персонажа...">
                <div class="filter-group">
                    <button onclick="filterAttr('all')" class="f-btn active">Все</button>
                    <button onclick="filterAttr('str')" class="f-btn">Сила</button>
                    <button onclick="filterAttr('agi')" class="f-btn">Ловкость</button>
                    <button onclick="filterAttr('int')" class="f-btn">Интеллект</button>
                </div>
            </div>
            <div class="grid" id="heroesGrid"></div>
        </section>

        <section id="items-sec" class="page">
            <div class="grid" id="itemsGrid"></div>
        </section>

        <section id="draft-sec" class="page">
            <div class="draft-board glass">
                <h2>АНАЛИЗАТОР ПИКА</h2>
                <div class="slots-row">
                    <div class="d-slot" onclick="openDraftSelector(0)">+</div>
                    <div class="d-slot" onclick="openDraftSelector(1)">+</div>
                    <div class="d-slot" onclick="openDraftSelector(2)">+</div>
                    <div class="d-slot" onclick="openDraftSelector(3)">+</div>
                    <div class="d-slot" onclick="openDraftSelector(4)">+</div>
                </div>
                <button class="big-btn" onclick="runAnalysis()">РАССЧИТАТЬ КОНТРПИК</button>
                <div id="draftOutput"></div>
            </div>
        </section>
    </main>

    <div id="heroModal" class="modal-overlay" onclick="closeModal('heroModal')">
        <div class="modal-content glass" onclick="event.stopPropagation()">
            <div id="modalContent"></div>
        </div>
    </div>

    <div id="selectorModal" class="modal-overlay" onclick="closeModal('selectorModal')">
        <div class="modal-content glass list-modal">
            <div class="grid small-grid" id="selectorGrid"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
