<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota 2 Draft AI Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="glass-header">
        <div class="logo">
            <span class="text-blue">CORE</span> <span class="text-green">v7.41a</span>
        </div>
        <nav class="tabs">
            <button class="tab-btn active" data-target="tab-heroes">Герои</button>
            <button class="tab-btn" data-target="tab-items">Предметы</button>
            <button class="tab-btn" data-target="tab-analytics">Аналитика Драфта</button>
        </nav>
    </header>

    <main class="content-container">
        
        <section id="tab-heroes" class="tab-content active">
            <div class="filters glass-panel">
                <input type="text" placeholder="Поиск героя..." class="glass-input">
                <select class="glass-select">
                    <option>Все атрибуты</option>
                    <option>Сила</option>
                    <option>Ловкость</option>
                    <option>Интеллект</option>
                    <option>Универсал</option>
                </select>
                <select class="glass-select">
                    <option>Все роли</option>
                    <option>Pos 1 (Carry)</option>
                    <option>Mid</option>
                    <option>Offlane</option>
                    <option>Support</option>
                </select>
            </div>

            <div class="hero-details glass-panel">
                <div class="hero-header">
                    <img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/antimage.png" alt="Anti-Mage" class="hero-avatar-fixed">
                    <div>
                        <h2 class="text-blue">Anti-Mage</h2>
                        <p class="text-green">Контр-пики и анализ</p>
                    </div>
                </div>
                
                <div id="counter-picks-container" class="counters-list">
                    </div>
            </div>
        </section>

        <section id="tab-items" class="tab-content glass-panel">
            <h2 class="text-blue">База предметов</h2>
            <p>Здесь будет сетка предметов с API OpenDota...</p>
        </section>

        <section id="tab-analytics" class="tab-content glass-panel">
            <h2 class="text-green">Анализ 5v5</h2>
            <div class="draft-analyzer">
                <div class="enemy-team">
                    <h3>Команда противника (Enemy)</h3>
                    <div class="draft-slots enemy-slots">
                        <div class="slot glass-input">Выбрать</div>
                        <div class="slot glass-input">Выбрать</div>
                        <div class="slot glass-input">Выбрать</div>
                        <div class="slot glass-input">Выбрать</div>
                        <div class="slot glass-input">Выбрать</div>
                    </div>
                </div>
                <div class="recommendations">
                    <button class="glass-btn pulse-anim">Сгенерировать идеальный пик</button>
                    </div>
            </div>
        </section>

    </main>

    <div class="ai-widget glass-panel">
        <div class="ai-header">
            <span class="text-blue">AI Оракул</span>
            <button id="toggle-chat" class="glass-btn-small">_</button>
        </div>
        <div class="ai-chat-body" id="ai-chat-body">
            <div class="msg ai-msg">Привет! Я ИИ-ассистент. Вижу патч 7.35d. Какой драфт будем разбирать?</div>
        </div>
        <div class="ai-input-area">
            <input type="text" id="ai-input" class="glass-input" placeholder="Спроси про контр-пик...">
            <button class="glass-btn-small text-green">➤</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
