<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOTA 2 — Counterpick Oracle</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --ink:      #04060f;
  --deep:     #070b1a;
  --surface:  #0c1128;
  --blue:     #3b82f6;
  --cyan:     #06b6d4;
  --violet:   #8b5cf6;
  --pink:     #ec4899;
  --str:      #ef4444;
  --agi:      #22c55e;
  --int:      #60a5fa;
  --uni:      #a78bfa;
  --gold:     #f59e0b;
  --text:     #e2e8f0;
  --muted:    #64748b;
  --glass-bg: rgba(255,255,255,0.045);
  --glass-b:  rgba(255,255,255,0.10);
  --glass-hi: rgba(255,255,255,0.14);
  --glow-b:   0 0 40px rgba(59,130,246,0.25);
  --glow-v:   0 0 40px rgba(139,92,246,0.25);
  --r-sm: 8px; --r-md: 14px; --r-lg: 20px; --r-xl: 26px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}

/* AMBIENT */
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(130px);animation:drift 15s ease-in-out infinite alternate}
.o1{width:800px;height:800px;background:var(--violet);opacity:.14;top:-250px;left:-200px;animation-delay:0s}
.o2{width:600px;height:600px;background:var(--blue);opacity:.13;bottom:-180px;right:-120px;animation-delay:-6s}
.o3{width:450px;height:450px;background:var(--cyan);opacity:.08;top:38%;left:48%;animation-delay:-11s}
@keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(45px,35px) scale(1.1)}}
.bg-canvas::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(99,102,241,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.035) 1px,transparent 1px);background-size:50px 50px}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(4,6,15,.78);backdrop-filter:blur(28px) saturate(200%);-webkit-backdrop-filter:blur(28px) saturate(200%);border-bottom:1px solid var(--glass-b);padding:0 1.5rem}
.hdr{max-width:1560px;margin:0 auto;display:flex;align-items:center;gap:1rem;height:60px}

.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:1.05rem;letter-spacing:.14em;background:linear-gradient(135deg,var(--cyan),var(--blue),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 10px rgba(59,130,246,.45));flex-shrink:0}

/* TABS */
.tabs{display:flex;background:var(--glass-bg);border:1px solid var(--glass-b);border-radius:50px;padding:3px;gap:2px;flex-shrink:0}
.t-btn{background:transparent;border:none;color:var(--muted);font-family:'Orbitron',monospace;font-size:.62rem;font-weight:600;letter-spacing:.1em;padding:.32rem .9rem;border-radius:50px;cursor:pointer;transition:all .25s;white-space:nowrap}
.t-btn.active{background:linear-gradient(135deg,rgba(59,130,246,.4),rgba(139,92,246,.4));color:#fff;box-shadow:0 0 14px rgba(59,130,246,.3)}
.t-btn:hover:not(.active){color:var(--text)}

/* SEARCH */
.search-wrap{flex:1;max-width:380px;position:relative}
.search-wrap input{width:100%;background:var(--glass-bg);border:1px solid var(--glass-b);border-radius:50px;padding:.42rem 1rem .42rem 2.4rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s,box-shadow .2s}
.search-wrap input::placeholder{color:var(--muted)}
.search-wrap input:focus{border-color:rgba(59,130,246,.5);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.si{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.85rem;pointer-events:none}

/* FILTERS */
.filters{display:flex;gap:.3rem;flex-shrink:0}
.f-btn{background:var(--glass-bg);border:1px solid var(--glass-b);border-radius:50px;padding:.3rem .7rem;color:var(--muted);font-size:.73rem;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.f-btn:hover{color:var(--text);border-color:var(--glass-hi)}
.f-btn.active[data-a="all"] {color:var(--cyan); border-color:var(--cyan); background:rgba(6,182,212,.12); box-shadow:0 0 12px rgba(6,182,212,.2)}
.f-btn.active[data-a="str"] {color:var(--str);  border-color:var(--str);  background:rgba(239,68,68,.12);  box-shadow:0 0 12px rgba(239,68,68,.2)}
.f-btn.active[data-a="agi"] {color:var(--agi);  border-color:var(--agi);  background:rgba(34,197,94,.12);  box-shadow:0 0 12px rgba(34,197,94,.2)}
.f-btn.active[data-a="int"] {color:var(--int);  border-color:var(--int);  background:rgba(96,165,250,.12); box-shadow:0 0 12px rgba(96,165,250,.2)}
.f-btn.active[data-a="universal"]{color:var(--uni);border-color:var(--uni);background:rgba(167,139,250,.12);box-shadow:0 0 12px rgba(167,139,250,.2)}

/* MAIN */
main{position:relative;z-index:1;max-width:1560px;margin:0 auto;padding:1.2rem 1.5rem 4rem}
#status-bar{text-align:center;padding:.5rem;font-size:.78rem;color:var(--muted);letter-spacing:.06em;display:flex;align-items:center;justify-content:center;gap:.5rem;min-height:2rem}
.pdot{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:pulse 1.6s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.meta-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;font-size:.76rem;color:var(--muted);letter-spacing:.05em}
.meta-row strong{color:var(--cyan)}

/* HERO GRID */
#hero-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:.85rem}

/* HERO CARD */
.hero-card{position:relative;border-radius:var(--r-md);overflow:hidden;cursor:pointer;background:var(--glass-bg);border:1px solid var(--glass-b);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s,border-color .3s;animation:cardIn .42s ease both}
@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.94)}to{opacity:1;transform:translateY(0) scale(1)}}
.hero-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 60%);pointer-events:none;z-index:1}
.hero-card:hover{transform:translateY(-6px) scale(1.03);border-color:rgba(59,130,246,.45);box-shadow:0 8px 40px rgba(0,0,0,.5),0 0 0 1px rgba(59,130,246,.2),var(--glow-b);z-index:2}
.hero-card img{width:100%;aspect-ratio:256/144;object-fit:cover;display:block;filter:brightness(.82) saturate(1.1);transition:filter .3s,transform .3s}
.hero-card:hover img{filter:brightness(1) saturate(1.2);transform:scale(1.04)}
.card-body{padding:.5rem .7rem .65rem;position:relative;z-index:2}
.card-name{font-weight:500;font-size:.8rem;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-tag{display:inline-block;margin-top:.28rem;font-size:.58rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:.1rem .45rem;border-radius:50px;border:1px solid currentColor;opacity:.85}
.t-str{color:var(--str)}.t-agi{color:var(--agi)}.t-int{color:var(--int)}.t-universal{color:var(--uni)}
.kb-dot{position:absolute;top:7px;right:7px;z-index:3;width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}

/* ITEM GRID */
#item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(205px,1fr));gap:.85rem}
.item-card{position:relative;border-radius:var(--r-md);overflow:hidden;background:var(--glass-bg);border:1px solid var(--glass-b);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:.8rem .9rem;display:flex;gap:.8rem;align-items:flex-start;transition:transform .25s,box-shadow .25s,border-color .25s;animation:cardIn .38s ease both}
.item-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.05) 0%,transparent 60%);pointer-events:none}
.item-card:hover{transform:translateY(-3px);border-color:rgba(139,92,246,.45);box-shadow:0 8px 30px rgba(0,0,0,.4),var(--glow-v)}
.item-icon-img{width:50px;height:36px;border-radius:5px;object-fit:cover;flex-shrink:0;border:1px solid var(--glass-b);background:var(--surface)}
.item-nf{width:50px;height:36px;border-radius:5px;flex-shrink:0;background:linear-gradient(135deg,rgba(139,92,246,.3),rgba(59,130,246,.2));border:1px solid var(--glass-b);display:none;align-items:center;justify-content:center;font-size:1rem}
.item-info{flex:1;min-width:0}
.item-name{font-weight:500;font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.2rem}
.item-desc{font-size:.7rem;color:var(--muted);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.item-cost{font-family:'Orbitron',monospace;font-size:.62rem;color:var(--gold);letter-spacing:.06em;margin-top:.28rem}

/* MODAL */
#overlay{position:fixed;inset:0;z-index:200;background:rgba(4,6,15,.78);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;padding:1rem}
#overlay.open{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
#modal{width:100%;max-width:740px;max-height:92vh;overflow-y:auto;border-radius:var(--r-xl);background:rgba(10,14,36,.94);border:1px solid var(--glass-hi);box-shadow:0 32px 80px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.06),var(--glow-b),var(--glow-v);animation:modalIn .28s cubic-bezier(.34,1.56,.64,1);scrollbar-width:thin;scrollbar-color:rgba(59,130,246,.4) transparent;position:relative}
#modal::before{content:'';position:absolute;inset:0;border-radius:var(--r-xl);pointer-events:none;background:linear-gradient(135deg,rgba(255,255,255,.07) 0%,transparent 50%)}
@keyframes modalIn{from{opacity:0;transform:scale(.88) translateY(28px)}to{opacity:1;transform:scale(1) translateY(0)}}

.m-header{position:relative;overflow:hidden;border-radius:var(--r-xl) var(--r-xl) 0 0}
.m-bg{width:100%;height:200px;object-fit:cover;display:block;filter:brightness(.4) saturate(.8);mask-image:linear-gradient(to bottom,rgba(0,0,0,1) 55%,transparent 100%);-webkit-mask-image:linear-gradient(to bottom,rgba(0,0,0,1) 55%,transparent 100%)}
.m-info{position:absolute;bottom:0;left:0;right:0;padding:1.1rem 1.5rem;background:linear-gradient(to top,rgba(10,14,36,.99) 0%,transparent 100%);display:flex;align-items:flex-end;gap:1.1rem}
.m-portrait{width:96px;height:54px;border-radius:var(--r-sm);object-fit:cover;border:1px solid var(--glass-hi);box-shadow:0 4px 20px rgba(0,0,0,.6);flex-shrink:0}
.m-text{flex:1}
.m-name{font-family:'Orbitron',monospace;font-weight:700;font-size:1.35rem;letter-spacing:.06em;line-height:1.1;color:#fff;text-shadow:0 0 20px rgba(59,130,246,.4)}
.m-meta{margin-top:.3rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.m-roles-txt{font-size:.7rem;color:var(--muted);letter-spacing:.04em}
.m-close{position:absolute;top:1rem;right:1rem;background:rgba(255,255,255,.1);border:1px solid var(--glass-b);border-radius:50%;width:32px;height:32px;color:var(--text);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:10;backdrop-filter:blur(8px)}
.m-close:hover{background:rgba(239,68,68,.2);border-color:rgba(239,68,68,.5)}

.m-body{padding:1.3rem 1.5rem 1.8rem}
.m-section{margin-bottom:1.3rem}
.s-label{font-family:'Orbitron',monospace;font-size:.6rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:.7rem;display:flex;align-items:center;gap:.5rem}
.s-label::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--glass-b),transparent)}

.c-list{list-style:none;display:flex;flex-direction:column;gap:.38rem}
.c-item{display:flex;align-items:center;gap:.7rem;padding:.55rem .8rem;background:var(--glass-bg);border:1px solid var(--glass-b);border-radius:var(--r-sm);font-size:.83rem;transition:border-color .2s}
.c-item:hover{border-color:rgba(6,182,212,.4)}
.c-num{font-family:'Orbitron',monospace;font-size:.58rem;color:var(--muted);width:1.2rem;flex-shrink:0}
.c-img{width:42px;height:24px;border-radius:3px;object-fit:cover;border:1px solid var(--glass-b);flex-shrink:0}

.i-list{display:flex;flex-direction:column;gap:.38rem}
.i-row{display:flex;align-items:flex-start;gap:.7rem;padding:.6rem .85rem;background:var(--glass-bg);border:1px solid var(--glass-b);border-radius:var(--r-sm);transition:border-color .2s}
.i-row:hover{border-color:rgba(139,92,246,.4)}
.i-icon{width:42px;height:30px;border-radius:4px;object-fit:cover;flex-shrink:0;background:var(--surface)}
.i-name{font-size:.8rem;font-weight:500}
.i-why{font-size:.71rem;color:var(--muted);margin-top:.12rem;line-height:1.4}

.tip-box{background:linear-gradient(135deg,rgba(59,130,246,.08),rgba(139,92,246,.06));border:1px solid rgba(59,130,246,.2);border-radius:var(--r-sm);padding:.8rem 1rem;font-size:.82rem;line-height:1.7;border-left:3px solid var(--blue)}
.no-data{font-size:.81rem;color:var(--muted);line-height:1.7;border-left:3px solid var(--muted);padding-left:.8rem}

/* SKELETON */
.sk{animation:shimmer 1.6s infinite;border-radius:var(--r-sm)}
@keyframes shimmer{0%,100%{background:rgba(255,255,255,.04)}50%{background:rgba(255,255,255,.08)}}
.sk-card{border-radius:var(--r-md);overflow:hidden;border:1px solid var(--glass-b);background:var(--glass-bg)}
.sk-img{width:100%;aspect-ratio:256/144;animation:shimmer 1.6s infinite}
.sk-ln{height:11px;margin:10px 10px 5px;border-radius:4px;animation:shimmer 1.6s infinite}
.sk-ln.s{width:55%;margin-bottom:12px}

/* EMPTY */
.empty-st{display:none;text-align:center;padding:5rem 2rem;grid-column:1/-1}
.empty-st .eg{font-size:2.5rem;margin-bottom:.8rem}
.empty-st p{font-family:'Orbitron',monospace;font-size:.88rem;color:var(--muted);letter-spacing:.1em}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(59,130,246,.4);border-radius:2px}

@media(max-width:640px){.filters{display:none}.m-name{font-size:1.05rem}.m-bg{height:150px}.t-btn{font-size:.56rem;padding:.28rem .65rem}}
</style>
</head>
<body>

<div class="bg-canvas">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
</div>

<header>
  <div class="hdr">
    <div class="logo">ORACLE</div>
    <div class="tabs">
      <button class="t-btn active" data-tab="heroes">⚔ ГЕРОИ</button>
      <button class="t-btn" data-tab="items">🛡 ПРЕДМЕТЫ</button>
    </div>
    <div class="search-wrap">
      <span class="si">⌕</span>
      <input type="text" id="search" placeholder="Поиск..." autocomplete="off" spellcheck="false">
    </div>
    <div class="filters" id="attr-filters">
      <button class="f-btn active" data-a="all">Все</button>
      <button class="f-btn" data-a="str">💪 Сила</button>
      <button class="f-btn" data-a="agi">⚡ Ловк</button>
      <button class="f-btn" data-a="int">🔮 Инт</button>
      <button class="f-btn" data-a="universal">✦ Уни</button>
    </div>
  </div>
</header>

<main>
  <div id="status-bar"><span class="pdot"></span> Загрузка данных...</div>
  <div class="meta-row" id="meta-row" style="display:none">
    <span id="cnt-lbl"></span><span id="src-lbl"></span>
  </div>

  <div id="hero-section">
    <div id="hero-grid"></div>
    <div class="empty-st" id="h-empty"><div class="eg">🔍</div><p>Ничего не найдено</p></div>
  </div>
  <div id="item-section" style="display:none">
    <div id="item-grid"></div>
    <div class="empty-st" id="i-empty"><div class="eg">🔍</div><p>Ничего не найдено</p></div>
  </div>
</main>

<div id="overlay">
  <div id="modal">
    <div class="m-header">
      <img id="m-bg" class="m-bg" src="" alt="">
      <div class="m-info">
        <img id="m-port" class="m-portrait" src="" alt="">
        <div class="m-text">
          <div class="m-name" id="m-name"></div>
          <div class="m-meta">
            <span class="card-tag" id="m-attr-tag"></span>
            <span class="m-roles-txt" id="m-roles"></span>
          </div>
        </div>
      </div>
      <button class="m-close" id="m-close">✕</button>
    </div>
    <div class="m-body" id="m-body"></div>
  </div>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════
   БАЗА ЗНАНИЙ
═══════════════════════════════════════════════ */
const KB = {
  axe:{counters:["Slark","Bristleback","Phantom Lancer"],items:[{name:"Black King Bar",key:"black_king_bar",why:"Иммунитет к Battle Hunger и Berserker's Call"},{name:"Eul's Scepter",key:"cyclone",why:"Снимает Battle Hunger с союзника"},{name:"Linken's Sphere",key:"sphere",why:"Блокирует Berserker's Call"}],tip:"Axe живёт Counter Helix. BKB убирает угрозу. Никогда не разделяйтесь — Culling Blade добивает одиночек."},
  bristleback:{counters:["Silver Edge","Bloodseeker","Ancient Apparition"],items:[{name:"Silver Edge",key:"silver_edge",why:"Отключает пассивный Bristleback — ключ к победе"},{name:"Diffusal Blade",key:"diffusal_blade",why:"Сжигает ману, замедляет бегство"},{name:"Ancient Apparition",key:"ancient_apparition",why:"Ульт AA отменяет реген от квилов"}],tip:"Атакуйте Bristleback сбоку или сзади. Silver Edge снимает его пассивку — он мгновенно теряет устойчивость."},
  centaur_warrunner:{counters:["Rubick","Pugna","Disruptor"],items:[{name:"Eul's Scepter",key:"cyclone",why:"Прерывает инициацию Stampede"},{name:"Force Staff",key:"force_staff",why:"Выносит союзника из Stampede"},{name:"Scythe of Vyse",key:"sheepstick",why:"Hex останавливает его до инициации"}],tip:"Centaur убивает через Blink+Stampede. Eul или Hex разрушают эту комбо полностью."},
  dragon_knight:{counters:["Ancient Apparition","Diffusal Blade","Earthshaker"],items:[{name:"Ancient Apparition",key:"ancient_apparition",why:"Отменяет огромный реген DK в Dragon Form"},{name:"Diffusal Blade",key:"diffusal_blade",why:"Замедляет и жжёт ману — кайт эффективен"},{name:"Abyssal Blade",key:"abyssal_blade",why:"Bash прерывает Dragon Tail и его касты"}],tip:"В Dragon Form DK получает зачаровывание — атакуйте до трансформации. AA делает его реген бесполезным."},
  doom_bringer:{counters:["Linken's Sphere","Nullifier","BKB"],items:[{name:"Linken's Sphere",key:"sphere",why:"Блокирует Doom — его единственный сильный спелл"},{name:"Nullifier",key:"nullifier",why:"Снимает Doom с союзника (развеивает)"},{name:"Black King Bar",key:"black_king_bar",why:"BKB делает вас иммунным к Doom"}],tip:"Doom блокирует все способности. Linken нейтрализует его полностью. Убивайте его первым в командных боях."},

/* ═══════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════ */
const HERO_API  = 'https://api.opendota.com/api/heroes';
const ITEM_API  = 'https://api.opendota.com/api/constants/items';
const H_CDN     = 'https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/';
const I_CDN     = 'https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/items/';
const ATTR_LBL  = {str:'Сила',agi:'Ловкость',int:'Интеллект',universal:'Универсал'};

let S = {tab:'heroes', heroes:[], items:[], filter:'all', q:'', src:'API'};

/* ═══════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════ */
const $  = id => document.getElementById(id);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const hImg = n => H_CDN + n.replace('npc_dota_hero_','') + '.png';
const iImg = k => I_CDN + k + '.png';
const kbK  = n => n.replace('npc_dota_hero_','');

/* ═══════════════════════════════════════════════
   LOAD
═══════════════════════════════════════════════ */
async function loadAll() {
  setStatus('Загрузка данных OpenDota...', true);
  showSkel();
  const timeout = ms => new Promise((_,r)=>setTimeout(()=>r('timeout'),ms));
  const sfetch  = async url => {
    const r = await Promise.race([fetch(url), timeout(8000)]);
    if (r === 'timeout' || !r.ok) throw new Error('fail');
    return r.json();
  };
  try {
    const [hd, id] = await Promise.all([sfetch(HERO_API), sfetch(ITEM_API)]);
    const seen = new Set();
    S.heroes = hd.filter(h => { if(seen.has(h.id)||!h.name) return false; seen.add(h.id); return true; });
    S.items = Object.entries(id)
      .filter(([k,v]) => v && v.dname && v.cost > 0 && !k.startsWith('recipe_') && !k.startsWith('item_'))
      .map(([k,v]) => ({key:k, name:v.dname, img:iImg(k), cost:v.cost, desc:v.notes || v.dname}))
      .sort((a,b) => a.name.localeCompare(b.name));
    S.src = 'OpenDota API';
    setStatus(`✓ Загружено ${S.heroes.length} героев, ${S.items.length} предметов`, false);
    setTimeout(() => { $('status-bar').style.display='none'; $('meta-row').style.display='flex'; }, 2400);
  } catch(e) {
    S.heroes = FB_HEROES;
    S.items  = FB_ITEMS;
    S.src    = 'офлайн-база';
    const sb = $('status-bar');
    setStatus('⚠ OpenDota недоступен — встроенная база', false);
    sb.style.color = '#f59e0b';
    $('meta-row').style.display = 'flex';
  }
  renderAll();
}

function setStatus(msg, loading) {
  const sb = $('status-bar');
  sb.style.display = 'flex';
  sb.innerHTML = loading ? `<span class="pdot"></span>${esc(msg)}` : esc(msg);
}

function showSkel(n=60) {
  $('hero-grid').innerHTML = Array.from({length:n},(_,i) => `
    <div class="sk-card" style="animation-delay:${i*.015}s">
      <div class="sk-img sk"></div>
      <div class="sk-ln sk" style="margin-top:11px"></div>
      <div class="sk-ln sk s"></div>
    </div>`).join('');
}

/* ═══════════════════════════════════════════════
   RENDER HEROES
═══════════════════════════════════════════════ */
function renderHeroes() {
  const grid = $('hero-grid'), empty = $('h-empty');
  const q = S.q.toLowerCase();
  const list = S.heroes.filter(h => {
    const ma = S.filter==='all' || h.primary_attr===S.filter;
    const mq = !q || h.localized_name.toLowerCase().includes(q);
    return ma && mq;
  });
  if (!list.length) { grid.innerHTML=''; empty.style.display='block'; setMeta(0,S.heroes.length); return; }
  empty.style.display='none';
  setMeta(list.length, S.heroes.length);
  grid.innerHTML = list.map((h,i) => {
    const key = kbK(h.name), hasKB = !!KB[key];
    return `<div class="hero-card" data-id="${h.id}" style="animation-delay:${Math.min(i*.016,.5)}s">
      ${hasKB?'<div class="kb-dot" title="Есть аналитика"></div>':''}
      <img src="${esc(hImg(h.name))}" alt="${esc(h.localized_name)}" loading="lazy"
           onerror="this.src='https://placehold.co/256x144/0c1128/3b82f6?text=?'">
      <div class="card-body">
        <div class="card-name">${esc(h.localized_name)}</div>
        <span class="card-tag t-${h.primary_attr}">${ATTR_LBL[h.primary_attr]||h.primary_attr}</span>
      </div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.hero-card').forEach(c =>
    c.addEventListener('click', () => { const h = S.heroes.find(x=>x.id===+c.dataset.id); if(h) openModal(h); })
  );
}

/* ═══════════════════════════════════════════════
   RENDER ITEMS
═══════════════════════════════════════════════ */
function renderItems() {
  const grid = $('item-grid'), empty = $('i-empty');
  const q = S.q.toLowerCase();
  const list = S.items.filter(it => !q || it.name.toLowerCase().includes(q) || it.desc.toLowerCase().includes(q));
  if (!list.length) { grid.innerHTML=''; empty.style.display='block'; setMeta(0,S.items.length); return; }
  empty.style.display='none';
  setMeta(list.length, S.items.length);
  grid.innerHTML = list.map((it,i) => `
    <div class="item-card" style="animation-delay:${Math.min(i*.01,.5)}s">
      <img class="item-icon-img" src="${esc(it.img)}" alt="${esc(it.name)}" loading="lazy"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="item-nf">⚔</div>
      <div class="item-info">
        <div class="item-name">${esc(it.name)}</div>
        <div class="item-desc">${esc(it.desc||'—')}</div>
        ${it.cost?`<div class="item-cost">${it.cost} 🪙</div>`:''}
      </div>
    </div>`).join('');
}

function renderAll() {
  if (S.tab==='heroes') renderHeroes(); else renderItems();
}

function setMeta(shown, total) {
  $('cnt-lbl').innerHTML = `Показано: <strong>${shown}</strong> из ${total}`;
  $('src-lbl').textContent = `Источник: ${S.src}`;
}

/* ═══════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════ */
function heroImgByName(name) {
  const f = S.heroes.find(h => h.localized_name.toLowerCase()===name.toLowerCase());
  if (f) return hImg(f.name);
  return H_CDN + name.toLowerCase().replace(/[\s'-]/g,'_') + '.png';
}

function openModal(h) {
  const key  = kbK(h.name);
  const data = KB[key];
  const img  = hImg(h.name);
  $('m-bg').src    = img;
  $('m-port').src  = img;
  $('m-name').textContent = h.localized_name;
  const tag = $('m-attr-tag');
  tag.className = `card-tag t-${h.primary_attr}`;
  tag.textContent = ATTR_LBL[h.primary_attr]||h.primary_attr;
  $('m-roles').textContent = (h.roles||[]).join(' · ');

  const body = $('m-body');
  if (data) {
    const cl = data.counters.map((c,i) => `
      <li class="c-item">
        <span class="c-num">${String(i+1).padStart(2,'0')}</span>
        <img class="c-img" src="${heroImgByName(c)}" alt="${esc(c)}" onerror="this.style.opacity=.3">
        <span>${esc(c)}</span>
      </li>`).join('');
    const il = data.items.map(it => `
      <div class="i-row">
        <img class="i-icon" src="${esc(iImg(it.key))}" alt="${esc(it.name)}" onerror="this.style.opacity=.3">
        <div>
          <div class="i-name">${esc(it.name)}</div>
          <div class="i-why">${esc(it.why)}</div>
        </div>
      </div>`).join('');
    body.innerHTML = `
      <div class="m-section"><div class="s-label">Контрпики</div><ul class="c-list">${cl}</ul></div>
      <div class="m-section"><div class="s-label">Предметы-контры</div><div class="i-list">${il}</div></div>
      <div class="m-section"><div class="s-label">Совет</div><div class="tip-box">${esc(data.tip)}</div></div>`;
  } else {
    body.innerHTML = `
      <div class="m-section"><div class="s-label">Информация</div>
      <div class="no-data">Детальной аналитики по ${esc(h.localized_name)} нет в базе.<br>
      Ключевые источники: <strong>dotabuff.com</strong>, <strong>dota2.fandom.com</strong>.<br>
      BKB нейтрализует большинство CC, Force Staff помогает кайтить и спасать союзников.</div></div>`;
  }
  $('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() { $('overlay').classList.remove('open'); document.body.style.overflow=''; }

/* ═══════════════════════════════════════════════
   EVENTS
═══════════════════════════════════════════════ */
document.querySelectorAll('.t-btn').forEach(b =>
  b.addEventListener('click', () => {
    S.tab = b.dataset.tab; S.q = ''; $('search').value='';
    document.querySelectorAll('.t-btn').forEach(x=>x.classList.toggle('active',x===b));
    $('hero-section').style.display = S.tab==='heroes'?'block':'none';
    $('item-section').style.display = S.tab==='items' ?'block':'none';
    $('attr-filters').style.display = S.tab==='heroes'?'flex' :'none';
    renderAll();
  })
);

document.querySelectorAll('.f-btn').forEach(b =>
  b.addEventListener('click', () => {
    document.querySelectorAll('.f-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); S.filter=b.dataset.a; renderHeroes();
  })
);

let st;
$('search').addEventListener('input', e => {
  clearTimeout(st);
  st = setTimeout(() => { S.q=e.target.value; renderAll(); }, 100);
});

$('m-close').addEventListener('click', closeModal);
$('overlay').addEventListener('click', e => { if(e.target===$('overlay')) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
