<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOTA 2 — Counterpick Oracle</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050505;
    --bg2: #0a0a0f;
    --bg3: #0d0d18;
    --neon: #00f2ff;
    --neon2: #0066ff;
    --neon3: #7b2fff;
    --red: #ff2d55;
    --gold: #ffd700;
    --text: #c8d8e8;
    --text-dim: #5a7a8a;
    --glass: rgba(0, 242, 255, 0.04);
    --glass-border: rgba(0, 242, 255, 0.15);
    --str: #e84c3d;
    --agi: #2ecc71;
    --int: #3498db;
    --all: #9b59b6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRID BACKGROUND ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,242,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,242,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 70% 20%, rgba(0,102,255,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 80%, rgba(0,242,255,0.04) 0%, transparent 45%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(5,5,5,0.85);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border-bottom: 1px solid var(--glass-border);
    padding: 0 2rem;
  }

  .header-inner {
    max-width: 1600px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    gap: 1.5rem;
  }

  .logo {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1.5rem;
    letter-spacing: 0.2em;
    color: var(--neon);
    text-shadow: 0 0 20px rgba(0,242,255,0.6), 0 0 40px rgba(0,242,255,0.2);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .logo span { color: var(--text-dim); font-weight: 400; }

  /* ── SEARCH ── */
  .search-wrap {
    flex: 1;
    max-width: 420px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 4px;
    padding: 0.5rem 1rem 0.5rem 2.6rem;
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }

  .search-wrap input::placeholder { color: var(--text-dim); }
  .search-wrap input:focus {
    border-color: var(--neon);
    box-shadow: 0 0 16px rgba(0,242,255,0.15);
  }

  .search-icon {
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    pointer-events: none;
    font-size: 0.9rem;
  }

  /* ── FILTERS ── */
  .filters {
    display: flex;
    gap: 0.4rem;
    flex-shrink: 0;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--glass-border);
    border-radius: 3px;
    padding: 0.35rem 0.8rem;
    color: var(--text-dim);
    font-family: 'Exo 2', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all .2s;
    text-transform: uppercase;
  }

  .filter-btn:hover { color: var(--text); border-color: rgba(0,242,255,0.35); }

  .filter-btn.active { border-color: currentColor; }
  .filter-btn[data-attr="all"].active  { color: var(--neon); box-shadow: 0 0 10px rgba(0,242,255,0.2); }
  .filter-btn[data-attr="str"].active  { color: var(--str); box-shadow: 0 0 10px rgba(232,76,61,0.25); }
  .filter-btn[data-attr="agi"].active  { color: var(--agi); box-shadow: 0 0 10px rgba(46,204,113,0.25); }
  .filter-btn[data-attr="int"].active  { color: var(--int); box-shadow: 0 0 10px rgba(52,152,219,0.25); }
  .filter-btn[data-attr="universal"].active { color: var(--all); box-shadow: 0 0 10px rgba(155,89,182,0.25); }

  /* ── MAIN ── */
  main {
    position: relative;
    z-index: 1;
    max-width: 1600px;
    margin: 0 auto;
    padding: 2rem;
  }

  /* ── STATUS BAR ── */
  #status-bar {
    text-align: center;
    padding: 1rem;
    font-size: 0.85rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    min-height: 2.5rem;
  }

  #status-bar .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--neon);
    box-shadow: 0 0 8px var(--neon);
    margin-right: 0.5rem;
    animation: blink 1.4s infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  #hero-count {
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-bottom: 1.5rem;
    letter-spacing: 0.08em;
  }

  #hero-count strong { color: var(--neon); }

  /* ── GRID ── */
  #hero-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1rem;
  }

  /* ── HERO CARD ── */
  .hero-card {
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    border: 1px solid rgba(0,242,255,0.08);
    background: var(--bg2);
    transition: transform .25s ease, border-color .25s, box-shadow .25s;
    animation: cardIn .4s ease both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .hero-card:hover {
    transform: translateY(-4px) scale(1.02);
    border-color: var(--neon);
    box-shadow: 0 0 24px rgba(0,242,255,0.25), 0 8px 32px rgba(0,0,0,0.6);
    z-index: 2;
  }

  .hero-card img {
    width: 100%;
    aspect-ratio: 256/144;
    object-fit: cover;
    display: block;
    filter: brightness(0.85);
    transition: filter .25s;
  }

  .hero-card:hover img { filter: brightness(1); }

  .card-info {
    padding: 0.55rem 0.7rem 0.65rem;
  }

  .card-name {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-attr {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 0.3rem;
    padding: 0.1rem 0.45rem;
    border-radius: 2px;
    border: 1px solid currentColor;
  }

  .attr-str { color: var(--str); }
  .attr-agi { color: var(--agi); }
  .attr-int { color: var(--int); }
  .attr-universal { color: var(--all); }

  .has-data-badge {
    position: absolute;
    top: 6px; right: 6px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--neon);
    box-shadow: 0 0 8px var(--neon);
  }

  /* ── MODAL OVERLAY ── */
  #modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    animation: fadeIn .2s ease;
  }

  #modal-overlay.open { display: flex; }

  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  /* ── MODAL ── */
  #modal {
    background: rgba(10, 12, 22, 0.97);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    width: 100%;
    max-width: 760px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 0 60px rgba(0,242,255,0.12), 0 0 120px rgba(0,102,255,0.08);
    animation: modalIn .25s ease;
    scrollbar-width: thin;
    scrollbar-color: var(--neon2) transparent;
  }

  @keyframes modalIn {
    from { opacity:0; transform: scale(0.94) translateY(20px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    position: relative;
    display: flex;
    gap: 1.5rem;
    align-items: flex-end;
    padding: 1.5rem 1.5rem 1.2rem;
    border-bottom: 1px solid var(--glass-border);
    background: linear-gradient(135deg, rgba(0,102,255,0.06), rgba(0,242,255,0.03));
  }

  .modal-hero-img {
    width: 180px;
    border-radius: 4px;
    border: 1px solid var(--glass-border);
    flex-shrink: 0;
    box-shadow: 0 0 20px rgba(0,242,255,0.1);
  }

  .modal-hero-info { flex: 1; }

  .modal-hero-name {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 2rem;
    letter-spacing: 0.08em;
    color: #fff;
    text-shadow: 0 0 20px rgba(0,242,255,0.4);
    line-height: 1.1;
  }

  .modal-hero-attr {
    margin-top: 0.4rem;
    display: inline-block;
  }

  .modal-roles {
    margin-top: 0.6rem;
    font-size: 0.78rem;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  .no-data-notice {
    margin-top: 0.8rem;
    padding: 0.45rem 0.8rem;
    background: rgba(255,45,85,0.08);
    border: 1px solid rgba(255,45,85,0.25);
    border-radius: 3px;
    font-size: 0.78rem;
    color: var(--red);
    display: none;
  }

  .modal-close {
    position: absolute;
    top: 1rem; right: 1rem;
    background: transparent;
    border: 1px solid var(--glass-border);
    color: var(--text-dim);
    width: 32px; height: 32px;
    border-radius: 4px;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
  }

  .modal-close:hover { border-color: var(--red); color: var(--red); }

  .modal-body {
    padding: 1.5rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.2rem;
  }

  @media (max-width: 560px) {
    .modal-body { grid-template-columns: 1fr; }
    .modal-hero-img { width: 120px; }
    .modal-hero-name { font-size: 1.5rem; }
  }

  .modal-section {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 6px;
    padding: 1rem 1.1rem;
  }

  .modal-section.full-width { grid-column: 1 / -1; }

  .section-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--neon);
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .section-title::before {
    content: '';
    display: inline-block;
    width: 3px; height: 14px;
    background: var(--neon);
    box-shadow: 0 0 8px var(--neon);
    border-radius: 2px;
  }

  /* counter list */
  .counter-list { list-style: none; }

  .counter-list li {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.45rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 0.88rem;
    font-weight: 600;
    letter-spacing: 0.04em;
  }

  .counter-list li:last-child { border-bottom: none; }

  .counter-list .num {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.75rem;
    color: var(--text-dim);
    width: 1.2rem;
    flex-shrink: 0;
  }

  /* item pill */
  .item-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: rgba(0,102,255,0.12);
    border: 1px solid rgba(0,102,255,0.3);
    border-radius: 3px;
    padding: 0.35rem 0.7rem;
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    margin: 0.2rem 0.2rem 0 0;
    color: #a8c8ff;
    transition: all .2s;
  }

  .item-pill:hover {
    border-color: var(--neon2);
    color: #fff;
    box-shadow: 0 0 10px rgba(0,102,255,0.3);
  }

  .item-pill .icon { font-size: 0.9rem; }

  /* tip */
  .tip-text {
    font-size: 0.84rem;
    line-height: 1.65;
    color: var(--text);
    border-left: 2px solid var(--neon2);
    padding-left: 0.9rem;
  }

  /* ── EMPTY STATE ── */
  #empty-state {
    display: none;
    text-align: center;
    padding: 5rem 2rem;
  }

  #empty-state .es-icon { font-size: 3rem; margin-bottom: 1rem; }
  #empty-state h3 { font-family: 'Rajdhani', sans-serif; font-size: 1.4rem; letter-spacing: 0.1em; color: var(--text-dim); }

  /* ── LOADING SKELETON ── */
  .skeleton-card {
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid rgba(0,242,255,0.06);
    background: var(--bg2);
  }

  .skeleton-img {
    width: 100%;
    aspect-ratio: 256/144;
    background: linear-gradient(90deg, #0d0d18 25%, #141428 50%, #0d0d18 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }

  .skeleton-text {
    height: 12px;
    margin: 10px 10px 6px;
    border-radius: 2px;
    background: linear-gradient(90deg, #0d0d18 25%, #141428 50%, #0d0d18 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }

  .skeleton-text.short { width: 50%; margin-bottom: 12px; }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--neon2); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">ORACLE<span> // DOTA 2</span></div>

    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search-input" placeholder="Поиск героя..." autocomplete="off" spellcheck="false">
    </div>

    <div class="filters">
      <button class="filter-btn active" data-attr="all">Все</button>
      <button class="filter-btn" data-attr="str">💪 СИЛ</button>
      <button class="filter-btn" data-attr="agi">⚡ ЛОВ</button>
      <button class="filter-btn" data-attr="int">🔮 ИНТ</button>
      <button class="filter-btn" data-attr="universal">✦ УНИ</button>
    </div>
  </div>
</header>

<main>
  <div id="status-bar"><span class="dot"></span> Загрузка данных с OpenDota API...</div>
  <div id="hero-count"></div>
  <div id="hero-grid"></div>
  <div id="empty-state">
    <div class="es-icon">🔍</div>
    <h3>Герои не найдены</h3>
  </div>
</main>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-header" id="modal-header">
      <img id="modal-img" class="modal-hero-img" src="" alt="">
      <div class="modal-hero-info">
        <div class="modal-hero-name" id="modal-name"></div>
        <div class="modal-hero-attr" id="modal-attr"></div>
        <div class="modal-roles" id="modal-roles"></div>
        <div class="no-data-notice" id="no-data-notice">⚠ Детальной аналитики по этому герою пока нет в базе</div>
      </div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// БАЗА ЗНАНИЙ — контрпики + предметы + советы
// ═══════════════════════════════════════════════════════════

    tip: "Ravage — один из самых мощных ультов. BKB полностью его отменяет. Rubick крадёт Ravage и использует против команды Tide. Faceless Void ловит его в Chronosphere."

  },
  "wraith_king": {

  },
  // ── ЛОВКАЧИ ──
  "phantom_assassin": {

    tip: "PA зависит от Critical Strike и Blur (уклонение). MKB полностью отключает её Blur. Heaven's Halberd дизармит и снимает уклонение. Bloodseeker видит её сквозь инвиз и ограничивает передвижение."
  },

// ═══════════════════════════════════════════════════════════
// УТИЛИТЫ
// ═══════════════════════════════════════════════════════════
function heroImgUrl(npcName) {
  const clean = npcName.replace('npc_dota_hero_', '');
  return `https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${clean}.png`;
}

function attrLabel(attr) {
  const map = { str:"Сила", agi:"Ловкость", int:"Интеллект", universal:"Универсал" };
  return map[attr] || attr;
}

function kbKey(heroName) {
  return heroName.replace('npc_dota_hero_', '');
}

// ═══════════════════════════════════════════════════════════
// СОСТОЯНИЕ
// ═══════════════════════════════════════════════════════════
let allHeroes = [];
let currentFilter = 'all';
let searchQuery = '';

// ═══════════════════════════════════════════════════════════
// СКЕЛЕТОНЫ
// ═══════════════════════════════════════════════════════════
function showSkeletons(n = 40) {
  const grid = document.getElementById('hero-grid');
  grid.innerHTML = Array.from({length: n}, () => `
    <div class="skeleton-card">
      <div class="skeleton-img"></div>
      <div class="skeleton-text"></div>
      <div class="skeleton-text short"></div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════════════════
// РЕНДЕР КАРТОЧЕК
// ═══════════════════════════════════════════════════════════
function renderHeroes() {
  const grid = document.getElementById('hero-grid');
  const emptyState = document.getElementById('empty-state');
  const heroCount = document.getElementById('hero-count');

  const q = searchQuery.toLowerCase();
  const filtered = allHeroes.filter(h => {
    const matchAttr = currentFilter === 'all' || h.primary_attr === currentFilter;
    const matchSearch = !q || h.localized_name.toLowerCase().includes(q);
    return matchAttr && matchSearch;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '';
    emptyState.style.display = 'block';
    heroCount.innerHTML = '';
    return;
  }

  emptyState.style.display = 'none';
  heroCount.innerHTML = `Показано героев: <strong>${filtered.length}</strong> из ${allHeroes.length}`;

  grid.innerHTML = filtered.map((h, i) => {
    const key = kbKey(h.name);
    const hasData = !!KNOWLEDGE_BASE[key];
    const imgUrl = heroImgUrl(h.name);
    return `
      <div class="hero-card" data-id="${h.id}" style="animation-delay:${Math.min(i*0.02, 0.5)}s">
        ${hasData ? '<div class="has-data-badge" title="Есть аналитика"></div>' : ''}
        <img src="${imgUrl}" alt="${h.localized_name}" loading="lazy" onerror="this.src='https://cdn.cloudflare.steamstatic.com/apps/dota2/images/heroes/default.png'">
        <div class="card-info">
          <div class="card-name">${h.localized_name}</div>
          <div class="card-attr attr-${h.primary_attr}">${attrLabel(h.primary_attr)}</div>
        </div>
      </div>
    `;
  }).join('');

  grid.querySelectorAll('.hero-card').forEach(card => {
    card.addEventListener('click', () => {
      const id = parseInt(card.dataset.id);
      openModal(allHeroes.find(h => h.id === id));
    });
  });
}

// ═══════════════════════════════════════════════════════════
// МОДАЛЬНОЕ ОКНО
// ═══════════════════════════════════════════════════════════
function openModal(hero) {
  if (!hero) return;
  const key = kbKey(hero.name);
  const data = KNOWLEDGE_BASE[key];

  document.getElementById('modal-img').src = heroImgUrl(hero.name);
  document.getElementById('modal-name').textContent = hero.localized_name;

  const attrEl = document.getElementById('modal-attr');
  attrEl.innerHTML = `<span class="card-attr attr-${hero.primary_attr}">${attrLabel(hero.primary_attr)}</span>`;

  const rolesEl = document.getElementById('modal-roles');
  rolesEl.textContent = hero.roles ? hero.roles.join(' · ') : '';

  document.getElementById('no-data-notice').style.display = data ? 'none' : 'block';

  const body = document.getElementById('modal-body');

  if (data) {
    const countersList = data.counters.map((c, i) => `
      <li><span class="num">${i+1}.</span> ${c}</li>
    `).join('');

    const itemsHtml = data.items.map(item => `
      <span class="item-pill"><span class="icon">⚔</span>${item}</span>
    `).join('');

    body.innerHTML = `
      <div class="modal-section">
        <div class="section-title">Контрпики</div>
        <ul class="counter-list">${countersList}</ul>
      </div>
      <div class="modal-section">
        <div class="section-title">Предметы-контры</div>
        <div>${itemsHtml}</div>
      </div>
      <div class="modal-section full-width">
        <div class="section-title">Совет по игре против</div>
        <p class="tip-text">${data.tip}</p>
      </div>
    `;
  } else {
    body.innerHTML = `
      <div class="modal-section full-width">
        <div class="section-title">Общие рекомендации</div>
        <p class="tip-text">
          Для этого героя нет данных в базе знаний. Базовые советы: изучайте сильные и слабые стороны героя на dotabuff.com или wiki.dota2.com.
          Обращайте внимание на атрибуты: герои <span style="color:var(--str)">Силы</span> — танки,
          <span style="color:var(--agi)">Ловкости</span> — физические дамагеры,
          <span style="color:var(--int)">Интеллекта</span> — маги и саппорты,
          <span style="color:var(--all)">Универсальные</span> — гибридные.
        </p>
      </div>
    `;
  }

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ═══════════════════════════════════════════════════════════
// ПОИСК И ФИЛЬТРЫ
// ═══════════════════════════════════════════════════════════
document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderHeroes();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.attr;
    renderHeroes();
  });
});

// ═══════════════════════════════════════════════════════════
// ЗАГРУЗКА ДАННЫХ
// ═══════════════════════════════════════════════════════════
async function loadHeroes() {
  const statusBar = document.getElementById('status-bar');
  showSkeletons(40);

  try {
    const res = await fetch('https://api.opendota.com/api/heroes', {
      signal: AbortSignal.timeout(7000)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);

    const heroes = await res.json();

    // deduplicate by id
    const seen = new Set();
    allHeroes = heroes.filter(h => {
      if (seen.has(h.id)) return false;
      seen.add(h.id);
      return true;
    });

    statusBar.innerHTML = `<span class="dot"></span> Данные загружены с OpenDota API — ${allHeroes.length} героев`;
    setTimeout(() => { statusBar.style.display = 'none'; }, 3000);

  } catch (err) {
    console.warn('OpenDota API недоступен, используется запасной список:', err);
    statusBar.innerHTML = `⚠ OpenDota API недоступен — используется встроенный список героев`;
    statusBar.style.color = '#ffd700';

    const seen = new Set();
    allHeroes = FALLBACK_HEROES.filter(h => {
      if (seen.has(h.id) || !h.name) return false;
      seen.add(h.id);
      return true;
    });
  }

  renderHeroes();
}

// ═══════════════════════════════════════════════════════════
// СТАРТ
// ═══════════════════════════════════════════════════════════
loadHeroes();
</script>
